<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קיץ 2026 | וינה ובודפשט</title>

<!-- ✅ פונט פרימיום -->
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Playfair+Display:wght@500;700;900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
html{scroll-behavior:smooth}

body{
margin:0;
font-family:'Assistant',Arial,sans-serif;
background:
radial-gradient(circle at top right, rgba(95,127,255,.20), transparent 24%),
radial-gradient(circle at top left, rgba(245,196,81,.18), transparent 20%),
linear-gradient(180deg,#eef3ff 0%,#f7f9fc 45%,#f5f7fb 100%);
color:#172033;
}

h1,h2,h3{
font-family:'Playfair Display',serif;
letter-spacing:-0.5px;
}

.container{width:min(1100px,calc(100% - 30px));margin:auto}

/* HERO */
.hero{
min-height:88vh;
background:
linear-gradient(rgba(0,0,0,.30),rgba(0,0,0,.62)),
url("https://images.unsplash.com/photo-1516550893923-42d28e5677af?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
color:white;
}

h1{font-size:clamp(40px,7vw,75px);margin:0 0 15px;line-height:.95;font-weight:800}
.subtitle{font-size:20px;max-width:760px;line-height:1.7}
.badges{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}
.badge{background:rgba(255,255,255,.20);padding:10px 14px;border-radius:999px;font-weight:700}

section{padding:60px 0}
h2{font-size:38px;margin:0 0 12px}
.desc{color:#60708c;font-size:18px;line-height:1.7;margin-bottom:28px}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}

.card{
background:white;
border-radius:24px;
overflow:hidden;
box-shadow:0 14px 34px rgba(20,30,55,.13);
transition:.35s ease;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 22px 46px rgba(20,30,55,.20);
}

.img{
height:270px;
position:relative;
overflow:hidden;
}

.img img{
width:100%;
height:100%;
object-fit:cover;
display:block;
transition:transform .6s ease;
}

.card:hover img{transform:scale(1.08)}

.tag{
position:absolute;
top:15px;
right:15px;
background:white;
padding:8px 14px;
border-radius:999px;
font-weight:800;
}

.content{padding:22px}

.city{
display:inline-block;
background:#eef2ff;
color:#2750d8;
padding:6px 12px;
border-radius:999px;
font-weight:800;
margin-bottom:10px;
}

.highlight{
background:#ecfdf3;
padding:13px;
border-radius:14px;
font-weight:700;
}

.map-frame{
width:100%;
height:300px;
border:0;
border-radius:16px;
margin-top:15px;
}

.map-btn{
display:inline-block;
margin-top:10px;
padding:12px 18px;
border-radius:999px;
background:linear-gradient(135deg,#3b82f6,#06b6d4);
color:white;
text-decoration:none;
font-weight:700;
}

footer{text-align:center;padding:35px;color:#60708c}

@media(max-width:850px){
.grid{grid-template-columns:1fr}
.img{height:230px}
}
</style>
</head>

<body>

<header class="hero">
<div class="container">
<h1>וינה & בודפשט</h1>
<div class="subtitle">
טיול משפחתי קיץ 2026 · אבי, אלינור, אלמה ואליאנה
</div>
</div>
</header>

<section>
<div class="container">
<h2>🇦🇹 וינה</h2>

<div class="grid">

<div class="card">
<div class="img">
<img src="https://upload.wikimedia.org/wikipedia/commons/2/23/Demel_Wien_Kohlmarkt.jpg"
onerror="this.src='https://images.unsplash.com/photo-1559925393-8be0ec4767c8?auto=format&fit=crop&w=1400&q=80'">
<div class="tag">יום 1</div>
</div>
<div class="content">
<h3>Demel + מרכז העיר</h3>
<div class="highlight">פתיחה רגועה ומתוקה</div>

<a class="map-btn" href="https://www.google.com/maps/dir/?api=1&origin=Stephansplatz+Vienna&destination=Stephansplatz+Vienna&travelmode=walking&waypoints=Graben+Vienna|Demel+Vienna" target="_blank">ניווט</a>

<iframe class="map-frame" src="https://www.google.com/maps?q=Stephansplatz+Vienna+to+Demel+Vienna&output=embed"></iframe>

</div>
</div>

<div class="card">
<div class="img">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Wiener_Riesenrad_2017.jpg"
onerror="this.src='https://images.unsplash.com/photo-1560969184-10fe8719e047?auto=format&fit=crop&w=1400&q=80'">
<div class="tag">יום 2</div>
</div>
<div class="content">
<h3>ZOOM + פראטר</h3>
</div>
</div>

<div class="card">
<div class="img">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Naschmarkt_Wien.jpg"
onerror="this.src='https://images.unsplash.com/photo-1506368249639-73a05d6f6488?auto=format&fit=crop&w=1400&q=80'">
<div class="tag">יום 3</div>
</div>
<div class="content">
<h3>Naschmarkt</h3>
</div>
</div>

<div class="card">
<div class="img">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Tiergarten_Sch%C3%B6nbrunn_Eingang.jpg"
onerror="this.src='https://images.unsplash.com/photo-1546182990-dffeafbe841d?auto=format&fit=crop&w=1400&q=80'">
<div class="tag">יום 4</div>
</div>
<div class="content">
<h3>גן חיות ושנברון</h3>
</div>
</div>

</div>
</div>
</section>

<footer>
✨ Summer 2026 ✨
</footer>

</body>
</html>
