    body {
      margin: 0;

      padding: 20px;

    }
    .search-box {

    }
    .search-box input {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      outline: none;
    }
    .search-box input:focus {
      border-color: #2563eb;
    }
    .stats {
      margin-bottom: 16px;
      color: #4b5563;
      font-size: 14px;
    }
    .table-wrap {
      overflow-x: auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }
    thead {
      background: #111827;
      color: white;
    }
    th, td {
      padding: 14px 12px;
      text-align: right;
      border-bottom: 1px solid #e5e7eb;
      white-space: nowrap;
    }
    tbody tr:hover {
      background: #f9fafb;
    }
    .amount {
      font-weight: bold;
      color: #047857;
    }
    .no-results {
      display: none;
      text-align: center;
      padding: 24px;
      color: #6b7280;
    }
    @media (max-width: 640px) {
      body { padding: 12px; }
      h1 { font-size: 24px; }
      th, td { padding: 10px 8px; font-size: 14px; }
    }

    }

      const value = document.getElementById("searchInput").value.trim().toLowerCase();

        item.country.toLowerCase().includes(value) ||
        item.city.toLowerCase().includes(value) ||
        item.currency.toLowerCase().includes(value) ||
        item.amount.toLowerCase().includes(value)
      );

      renderTable(filtered);
