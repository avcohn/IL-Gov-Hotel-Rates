<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קיץ 2026 | וינה ובודפשט</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* משתני צבע לתחזוקה קלה */
            --primary-color: #2750d8;
            --primary-light: #eef2ff;
            --text-dark: #172033;
            --text-muted: #60708c;
            --success-bg: #ecfdf3;
            --success-text: #1f6b37;
            --card-bg: #ffffff;
            --bg-gradient: linear-gradient(180deg, #eef3ff 0%, #f7f9fc 45%, #f5f7fb 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Heebo', Arial, sans-serif;
            background: 
                radial-gradient(circle at top right, rgba(95,127,255,.15), transparent 24%),
                radial-gradient(circle at top left, rgba(245,196,81,.15), transparent 20%),
                var(--bg-gradient);
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            width: min(1100px, 90%);
            margin: auto;
        }

        /* --- Hero Section --- */
        .hero {
            min-height: 88vh;
            background: 
                linear-gradient(rgba(0,0,0,.40), rgba(0,0,0,.70)),
                url("https://images.unsplash.com/photo-1516550893923-42d28e5677af?auto=format&fit=crop&w=1600&q=80");
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            color: #fff;
            padding: 40px 0;
        }

        h1 {
            font-size: clamp(40px, 7vw, 75px);
            margin: 15px 0;
            line-height: 1;
            font-weight: 800;
        }

        .subtitle {
            font-size: clamp(16px, 2vw, 20px);
            max-width: 760px;
            line-height: 1.7;
            opacity: 0.95;
        }

        .badges {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 25px;
        }

        .badge {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            padding: 10px 16px;
            border-radius: 999px;
            font-weight: 600;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* --- Sections & Typography --- */
        section {
            padding: 80px 0;
        }

        h2 {
            font-size: 38px;
            margin: 0 0 12px;
            font-weight: 800;
        }

        .desc {
            color: var(--text-muted);
            font-size: 18px;
            max-width: 700px;
            margin-bottom: 40px;
        }

        /* --- Grid & Cards --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 28px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(20,30,55,.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(20,30,55,.15);
        }

        .img {
            height: 250px;
            position: relative;
            background: linear-gradient(135deg, #dbeafe, #fde68a);
            overflow: hidden;
        }

        .img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover .img img {
            transform: scale(1.05);
        }

        .tag {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--card-bg);
            padding: 8px 14px;
            border-radius: 999px;
            font-weight: 800;
            font-size: 14px;
            box-shadow: 0 6px 18px rgba(0,0,0,.15);
            color: var(--text-dark);
        }

        .content {
            padding: 24px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .city {
            align-self: flex-start;
            background: var(--primary-light);
            color: var(--primary-color);
            padding: 6px 12px;
            border-radius: 999px;
            font-weight: 800;
            font-size: 14px;
            margin-bottom: 12px;
        }

        h3 {
            font-size: 24px;
            margin-bottom: 12px;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        /* --- Lists --- */
        .list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 10px 0 20px;
            flex-grow: 1;
        }

        .item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            color: var(--text-dark);
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--primary-color);
            border-radius: 50%;
            margin-top: 8px;
            flex-shrink: 0;
        }

        /* --- Highlights & Special Components --- */
        .highlight {
            background: var(--success-bg);
            padding: 14px;
            border-radius: 14px;
            font-weight: 800;
            color: var(--success-text);
            margin-top: auto; /* דוחף את ההיילייט לתחתית הכרטיסייה תמיד */
        }

        .transfer {
            background: linear-gradient(135deg, #1e3a8a, var(--primary-color));
            color: white;
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 14px 34px rgba(39, 80, 216, 0.2);
            text-align: center;
        }

        .transfer h2 {
            margin-bottom: 15px;
        }

        .transfer p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 18px;
            margin: 0;
            max-width: 800px;
            margin: 0 auto;
        }

        /* --- Tips Section --- */
        .tips {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .tip {
            background: var(--card-bg);
            border-radius: 22px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(20,30,55,.06);
            transition: transform 0.3s ease;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .tip:hover {
            transform: translateY(-5px);
        }

        .tip h3 {
            font-size: 20px;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .tip p {
            margin: 0;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            border-top: 1px solid rgba(0,0,0,0.05);
            font-weight: 600;
        }

        /* --- Media Queries --- */
        @media(max-width: 768px) {
            .hero {
                min-height: 70vh;
