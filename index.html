<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>רשימת יעדים</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
      direction: rtl;
    }

    h1 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .city {
      font-weight: bold;
      font-size: 18px;
    }

    .price {
      color: green;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<h1>✈️ רשימת יעדים</h1>

<input type="text" id="search" placeholder="חפש יעד..." onkeyup="filterList()">

<div id="list">

  <div class="card">
    <div class="city">ברצלונה</div>
    <div class="price">החל מ-€350</div>
  </div>

  <div class="card">
    <div class="city">רומא</div>
    <div class="price">החל מ-€280</div>
  </div>

  <div class="card">
    <div class="city">פריז</div>
    <div class="price">החל מ-€420</div>
  </div>

  <div class="card">
    <div class="city">לונדון</div>
    <div class="price">החל מ-€390</div>
  </div>

</div>

<script>
function filterList() {
  let input = document.getElementById("search").value.toLowerCase();
  let cards = document.getElementsByClassName("card");

  for (let i = 0; i < cards.length; i++) {
    let city = cards[i].innerText.toLowerCase();
    cards[i].style.display = city.includes(input) ? "block" : "none";
  }
}
</script>

</body>
</html>
