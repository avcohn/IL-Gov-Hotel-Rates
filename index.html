<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קיץ 2026 | וינה ובודפשט</title>

<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@700;900&family=Rubik:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>

<style>
body{
  margin:0;
  font-family:'Rubik',sans-serif;
  background:#f8fafc;
  overflow-x:hidden;
}

.hero{
  text-align:center;
  padding:20px;
}

.hero img{
  width:100%;
  max-width:1100px;
  border-radius:20px;
  display:block;
  margin:auto;
}

.hero-bottom{
  margin-top:15px;
}

.flight-row{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

.fchip{
  background:#fff;
  padding:10px 16px;
  border-radius:12px;
  font-size:14px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.btns{
  margin-top:10px;
  display:flex;
  justify-content:center;
  gap:10px;
}

.btn{
  padding:12px 20px;
  border-radius:999px;
  text-decoration:none;
  font-weight:700;
}

.btn-g{background:#c8963c;color:#fff;}
.btn-o{background:#fff;color:#000;border:1px solid #ddd;}

.wrap{
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

.card{
  background:#fff;
  border-radius:20px;
  overflow:hidden;
}

.cimg-w{
  height:220px;
  position:relative;
}

.cimg-w img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 🔥 overlay רק על כרטיסים */
.cov{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.6),transparent);
}

.cbody{
  padding:15px;
}

@media(max-width:700px){
  .grid{grid-template-columns:1fr;}

  .flight-row{flex-direction:column;}

  .btns{
    flex-direction:column;
  }

  .btn{width:100%;}
}
</style>
</head>

<body>

<header class="hero">
  <img src="hero-family.png">

  <div class="hero-bottom">
    <div class="flight-row">
      <div class="fchip">20.8 טיסה לוינה</div>
      <div class="fchip">24.8 רכבת לבודפשט</div>
      <div class="fchip">27.8 חזרה</div>
    </div>

    <div class="btns">
      <a class="btn btn-g" href="#vienna">וינה</a>
      <a class="btn btn-o" href="#budapest">בודפשט</a>
    </div>
  </div>
</header>

<section id="vienna" class="wrap">
  <div class="grid">

    <div class="card">
      <div class="cimg-w">
        <img src="1.jpg">
        <div class="cov"></div>
      </div>
      <div class="cbody">יום 1</div>
    </div>

    <div class="card">
      <div class="cimg-w">
        <img src="2.jpg">
        <div class="cov"></div>
      </div>
      <div class="cbody">יום 2</div>
    </div>

    <div class="card">
      <div class="cimg-w">
        <img src="3.jpg">
        <div class="cov"></div>
      </div>
      <div class="cbody">יום 3</div>
    </div>

    <div class="card">
      <div class="cimg-w">
        <img src="4.jpg">
        <div class="cov"></div>
      </div>
      <div class="cbody">יום 4</div>
    </div>

  </div>
</section>

<section id="budapest" class="wrap">
  <div class="grid">

    <div class="card">
      <div class="cimg-w">
        <img src="5.jpg">
        <div class="cov"></div>
      </div>
      <div class="cbody">יום 5</div>
    </div>

    <div class="card">
      <div class="cimg-w">
        <img src="6.jpg">
        <div class="cov"></div>
      </div>
      <div class="cbody">יום 6</div>
    </div>

    <div class="card">
      <div class="cimg-w">
        <img src="7.jpg">
        <div class="cov"></div>
      </div>
      <div class="cbody">יום 7</div>
    </div>

    <div class="card">
      <div class="cimg-w">
        <img src="8.jpg">
        <div class="cov"></div>
      </div>
      <div class="cbody">יום 8</div>
    </div>

  </div>
</section>

</body>
</html>
